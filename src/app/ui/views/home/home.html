<div class="dashboard">

  <!-- Top: Map + Stats Row -->
  <div class="dashboard__main-row">

    <!-- Left: Map card -->
    <app-farm-overview-map />

    <!-- Right: Stats cards -->
    <div class="dashboard__stats">
      @if (viewModel.isLoading()) {
      <!-- Skeletons -->
      @for (i of [1,2,3]; track i) {
      <div class="bg-white rounded-[14px] p-[16px_18px] flex gap-[14px] animate-pulse">
        <div class="w-[38px] h-[38px] rounded-[10px] bg-gray-200"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="h-2 bg-gray-200 rounded w-1/2"></div>
          <div class="h-6 bg-gray-200 rounded w-3/4"></div>
          <div class="h-2 bg-gray-200 rounded w-1/4"></div>
        </div>
      </div>
      }
      } @else if (viewModel.hasError()) {
      <!-- Error State -->
      <div class="bg-red-50 border border-red-100 rounded-[14px] p-[20px] text-center">
        <span class="material-symbols-outlined text-red-400 text-[32px] mb-2">error_outline</span>
        <div class="text-red-800 font-semibold text-[14px]">{{ 'PAGES.HOME.DASHBOARD.LOAD_ERROR_TITLE' | translate }}
        </div>
        <div class="text-red-600 text-[12px] mt-1">{{ 'PAGES.HOME.DASHBOARD.LOAD_ERROR_SUB' | translate }}</div>
        <button (click)="viewModel.initialize()"
          class="mt-3 text-[12px] font-bold text-red-700 underline uppercase tracking-wider">
          {{ 'COMMON.RETRY' | translate }}
        </button>
      </div>
      } @else {
      <!-- Success State -->
      <div class="gap-10 flex flex-col justify-between">
        <app-total-plants [total]="viewModel.totalPlants()" [latestUpdatedAt]="viewModel.latestUpdatedAt()" />
        <app-orchard-vigor [percent]="viewModel.vigorPercent()" />
        <app-progress-card [percent]="viewModel.progressPercent()" />
      </div>
      }
    </div>
  </div>

  <!-- Bottom: Recent Updates + Alerts -->
  <div class="dashboard__bottom-row">

    <!-- Recent Updates -->
    <app-recent-updates-table [updates]="viewModel.recentUpdates()" [isLoading]="viewModel.isLoading()"
      (refresh)="viewModel.refreshRecentUpdates()" />

    <!-- Right: Alerts + Forecast -->
    <app-home-alerts-forecast-panel />
  </div>
</div>
