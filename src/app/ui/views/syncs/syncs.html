<div class="max-w-6xl space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div>
    <h1 class="text-3xl font-bold text-slate-900">Sincronizações</h1>
    <p class="text-slate-500 mt-1">
      Gerencie e acompanhe o status das sincronizações de campo.
    </p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <!-- Tabs Header -->
    <div class="flex border-b border-slate-100 overflow-x-auto bg-slate-50/50">
      @for (tab of tabs; track tab.id) {
        <button
          (click)="setActiveTab(tab.id)"
          [ngClass]="
            activeTab === tab.id
              ? 'text-emerald-600 border-emerald-600 bg-white'
              : 'text-slate-500 border-transparent hover:text-slate-700'
          "
          class="px-6 py-4 text-sm font-semibold border-b-2 transition-all whitespace-nowrap focus:outline-none"
        >
          {{ tab.label }}
        </button>
      }
    </div>

    <!-- Tab Content -->
    <div class="p-6">
      @if (activeTab === 'annotations') {
        <div class="animate-in fade-in duration-300">
          <app-annotations-table />
        </div>
      }

      @if (activeTab === 'new-plants') {
        <div class="animate-in fade-in duration-300">
          <app-new-plants-table />
        </div>
      }

      @if (activeTab === 'routines') {
        <div class="animate-in fade-in duration-300">
          <app-routines-table />
        </div>
      }
    </div>
  </div>
</div>
