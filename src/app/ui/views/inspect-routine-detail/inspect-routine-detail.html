<div class="flex flex-1 overflow-hidden h-full">
  <!-- Left Side: Carousel of Requests -->
  <section
    class="w-[40%] flex flex-col p-8 lg:p-12 space-y-6 overflow-y-auto bg-surface-container-low border-r border-outline-variant/10"
  >
    <div class="flex flex-col gap-4 mb-2">
      <div class="flex items-center justify-between">
        <div>
          <h2
            class="text-3xl font-headline font-extrabold text-on-surface tracking-tight"
          >
            Inspeção #{{ id }}
          </h2>
          <p class="text-on-surface-variant text-sm mt-1">
            Revise e aprova as solicitações
          </p>
        </div>
        <div
          class="px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full"
        >
          12 Pendentes
        </div>
      </div>
    </div>

    <!-- Carousel Card Container -->
    <div class="relative group">
      <div
        class="bg-surface-container-lowest rounded-2xl shadow-xl shadow-primary/5 p-8 border border-outline-variant/10"
      >
        <div class="flex flex-col gap-4 mb-8">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-2xl font-headline font-bold text-primary">
                TR-204
              </h3>
            </div>
          </div>
          <!-- Updated Occurrence Badges List -->
          <div class="flex flex-wrap gap-2 pt-2">
            <!-- Exclusion Style (Negative/Issues) -->
            <div
              class="bg-error-container/40 text-on-error-container px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1"
            >
              <span class="material-symbols-outlined text-sm">remove</span>
              Galho Quebrado
            </div>
            <div
              class="bg-error-container/40 text-on-error-container px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1"
            >
              <span class="material-symbols-outlined text-sm">remove</span>
              Infestação de Formigas
            </div>
            <!-- Inclusion Style (Positive/Actions/Added) -->
            <div
              class="bg-secondary-container/50 text-on-secondary-container px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1"
            >
              <span class="material-symbols-outlined text-sm">add</span>
              Nova Adubação
            </div>
            <div
              class="bg-secondary-container/50 text-on-secondary-container px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1"
            >
              <span class="material-symbols-outlined text-sm">add</span>
              Tratamento Aplicado
            </div>
          </div>
          <div class="pt-4 border-t border-outline-variant/10">
            <p class="text-on-surface-variant text-xs font-medium"><br /></p>
          </div>
        </div>
        <!-- Carousel Controls -->
        <div class="flex items-center justify-between">
          <button
            class="flex items-center gap-2 text-on-surface-variant hover:text-primary font-bold text-sm transition-colors active:scale-95"
          >
            <span class="material-symbols-outlined">chevron_left</span>
            Anterior
          </button>
          <div class="flex gap-1.5">
            <div class="w-8 h-1.5 rounded-full bg-primary"></div>
            <div class="w-2 h-1.5 rounded-full bg-surface-dim"></div>
            <div class="w-2 h-1.5 rounded-full bg-surface-dim"></div>
            <div class="w-2 h-1.5 rounded-full bg-surface-dim"></div>
          </div>
          <button
            class="flex items-center gap-2 text-on-surface-variant hover:text-primary font-bold text-sm transition-colors active:scale-95"
          >
            Próximo
            <span class="material-symbols-outlined">chevron_right</span>
          </button>
        </div>
      </div>
      <!-- Visual Accents -->
      <div
        class="absolute -top-4 -right-4 w-16 h-16 bg-secondary-container/20 rounded-full blur-2xl -z-10"
      ></div>
    </div>

    <div class="grid grid-cols-2 gap-4 pt-4">
      <button
        (click)="onReject()"
        class="flex items-center justify-center gap-2 py-5 border-2 border-error/30 text-error rounded-2xl font-headline font-bold hover:bg-error/5 active:scale-95 transition-all"
      >
        <span class="material-symbols-outlined">cancel</span>
        Rejeitar Solicitação
      </button>
      <button
        (click)="onApprove()"
        class="flex items-center justify-center gap-2 py-5 bg-linear-to-br from-primary to-primary-container text-white rounded-2xl font-headline font-bold shadow-lg shadow-primary/25 hover:scale-[1.02] active:scale-95 transition-all"
      >
        <span class="material-symbols-outlined">check_circle</span>
        Aprovar Alteração
      </button>
    </div>

    <div class="flex justify-start mt-auto">
      <button
        (click)="goBack()"
        class="flex items-center gap-2 px-1 py-2 text-on-surface-variant hover:text-primary transition-all active:scale-95 text-sm font-bold group"
      >
        <span
          class="material-symbols-outlined text-[20px] transition-transform group-hover:-translate-x-1"
          >arrow_back</span
        >
        Voltar
      </button>
    </div>
  </section>

  <!-- Right Side: Map Display -->
  <section class="flex-1 relative bg-surface-dim overflow-hidden">
    <div id="map-detail" class="absolute inset-0 z-0"></div>

    <!-- Map Overlays -->
    <!-- Map Legend/Overlay Controls -->

    <div class="absolute bottom-2 right-8 z-10 flex flex-col gap-2">
      <button
        (click)="zoomIn()"
        class="w-12 h-12 bg-surface-container-lowest/95 backdrop-blur shadow-2xl rounded-xl flex items-center justify-center text-on-surface hover:bg-primary hover:text-white transition-all active:scale-95"
      >
        <span class="material-symbols-outlined">add</span>
      </button>
      <button
        (click)="zoomOut()"
        class="w-12 h-12 bg-surface-container-lowest/95 backdrop-blur shadow-2xl rounded-xl flex items-center justify-center text-on-surface hover:bg-primary hover:text-white transition-all active:scale-95"
      >
        <span class="material-symbols-outlined">remove</span>
      </button>
      <button
        class="w-12 h-12 bg-surface-container-lowest/95 backdrop-blur shadow-2xl rounded-xl flex items-center justify-center text-on-surface hover:bg-primary hover:text-white transition-all active:scale-95"
      >
        <span class="material-symbols-outlined">layers</span>
      </button>
    </div>
  </section>
</div>
