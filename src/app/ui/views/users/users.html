<div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Usuários</h1>
      <p class="text-slate-500 mt-1">Gerencie os membros da sua equipe e suas permissões.</p>
    </div>
    <button
      class="flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition-all active:scale-95 shadow-sm"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
        />
      </svg>
      Convidar Usuário
    </button>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <!-- Header/Search -->
    <div
      class="p-4 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row justify-between gap-4"
    >
      <div class="flex-1 min-w-[300px]">
        <app-input
          placeholder="Buscar usuários..."
          icon="<svg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' /></svg>"
        ></app-input>
      </div>
      <div class="flex gap-2">
        <button
          class="px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors"
        >
          Exportar CSV
        </button>
        <button
          class="px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors"
        >
          Filtros Avançados
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-white">
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">
              Usuário
            </th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">
              Cargo
            </th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">
              Status
            </th>
            <th
              class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right"
            >
              Gerenciar
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          @for (user of users; track user) {
            <tr class="hover:bg-slate-50/80 transition-colors">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <img
                    [src]="user.avatar"
                    class="w-10 h-10 rounded-full border border-slate-100"
                    [alt]="user.name"
                  />
                  <div>
                    <p class="text-sm font-bold text-slate-900">{{ user.name }}</p>
                    <p class="text-xs text-slate-500">{{ user.email }}</p>
                  </div>
                </div>
              </td>
              <td class="px-6 py-4">
                <span
                  class="px-2.5 py-1 text-xs font-semibold rounded-lg"
                  [ngClass]="getRoleClass(user.role)"
                >
                  {{ user.role }}
                </span>
              </td>
              <td class="px-6 py-4">
                <div class="flex items-center gap-1.5">
                  <span
                    class="w-2 h-2 rounded-full"
                    [ngClass]="
                      user.status === 'Ativo'
                        ? 'bg-emerald-500'
                        : user.status === 'Inativo'
                          ? 'bg-slate-400'
                          : 'bg-amber-500'
                    "
                  ></span>
                  <span class="text-sm font-medium text-slate-600">{{ user.status }}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="flex justify-end gap-2">
                  <button
                    title="Editar"
                    class="p-2 text-blue-600 hover:opacity-70 transition-all"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-4 w-4"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                      />
                    </svg>
                  </button>
                  <button
                    title="Excluir"
                    class="p-2 text-rose-600 hover:opacity-70 transition-all"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-4 w-4"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      />
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
