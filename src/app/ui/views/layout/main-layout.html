<div class="min-h-screen bg-slate-50 font-sans text-slate-900">
  <app-header (sidebarToggled)="toggleSidebar()" />

  <app-sidebar [isCollapsed]="isSidebarCollapsed()" />

  <!-- Content Area -->
  <main
    class="transition-all duration-300 ease-in-out pt-[60px]"
    [ngClass]="isSidebarCollapsed() ? 'pl-[64px]' : 'pl-[240px]'"
  >
    <div class="p-6 lg:p-8 min-h-[calc(100vh-60px)]">
      <router-outlet />
    </div>
  </main>
</div>
