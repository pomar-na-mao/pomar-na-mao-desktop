<nav
  class="w-[240px] h-screen flex flex-col p-0 overflow-hidden z-100 border-r border-solid"
  style="background: linear-gradient(to bottom, var(--color-sidebar-bg-from, var(--color-primary-container)), var(--color-sidebar-bg-to, var(--color-primary))); border-color: var(--color-on-sidebar-border, rgba(255,255,255,0.06));"
>
  <!-- Brand -->
  <div
    class="flex items-center gap-2.5 px-5 pt-5 pb-[18px] border-b border-solid"
    style="border-color: var(--color-on-sidebar-border, rgba(255,255,255,0.08));"
  >
    <div class="w-10 h-10 flex items-center justify-center shrink-0">
      <img
        src="assets/images/logo.png"
        [alt]="'LAYOUT.SIDEBAR.BRAND_NAME' | translate"
        class="w-full h-full object-contain"
      />
    </div>
    <div class="flex flex-col leading-[1.2]">
      <span
        class="text-[13px] font-bold tracking-tight"
        style="color: var(--color-on-sidebar, var(--color-on-primary));"
        >{{ 'LAYOUT.SIDEBAR.BRAND_NAME' | translate }}</span
      >
      <span
        class="text-[10px] font-normal tracking-wider mt-0.5"
        style="color: var(--color-on-sidebar-muted, rgba(255,255,255,0.45));"
        >{{ 'LAYOUT.SIDEBAR.TAGLINE' | translate }}</span
      >
    </div>
  </div>

  <!-- Navigation -->
  <ul class="list-none m-0 px-2 py-3 flex-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
    <li class="mb-0.5">
      <a
        [routerLink]="item.route"
        routerLinkActive="active-nav-link"
        class="sidebar-nav-link flex items-center gap-3 px-3 py-2.5 rounded-[10px] no-underline text-[13px] font-medium transition-all duration-150 cursor-pointer group"
        [style.color]="'var(--color-on-sidebar-muted, rgba(255,255,255,0.7))'"
      >
        <span
          class="material-symbols-outlined text-xl leading-none shrink-0 transition-colors duration-150"
        >
          {{ item.icon }}
        </span>
        <span class="whitespace-nowrap overflow-hidden text-ellipsis"
          >{{ item.label | translate }}</span
        >
      </a>
    </li>
    }
  </ul>

  <!-- Logout -->
  <div
    class="px-4 pt-4 pb-5 border-t border-solid"
    style="border-color: var(--color-on-sidebar-border, rgba(255,255,255,0.08));"
  >
    <button
      class="flex items-center justify-center gap-1.5 w-full px-4 py-2.5 bg-error text-on-error border border-solid border-error rounded-[10px] text-[13px] font-semibold font-['Poppins'] cursor-pointer opacity-90 transition-all duration-150 hover:opacity-100 hover:-translate-y-px active:translate-y-0"
      (click)="logout()"
    >
      <span class="material-symbols-outlined text-[18px]">logout</span>
      {{ 'LAYOUT.SIDEBAR.LOGOUT' | translate }}
    </button>
  </div>
</nav>
