<div
  class="mass-card lg:h-full rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"
>
  <div class="mb-4 border-b border-slate-100 pb-3">
    <h2 class="text-lg font-bold text-slate-800">
      Dados para Inclusão em Massa
    </h2>
    <p class="mt-1 text-sm text-slate-500">
      Selecione uma área no mapa para habilitar o formulário.
    </p>
  </div>

  <form
    [formGroup]="massInclusionViewModel.massInclusionDataForm"
    (ngSubmit)="onSaveMassInclusionData()"
    class="flex lg:h-[calc(100%-5.75rem)] flex-col"
  >
    <div class="flex-1 space-y-4 lg:overflow-y-auto px-1.5">
      @if (!massInclusionViewModel.canEditForm()) {
      <div
        class="rounded-xl border border-amber-100 bg-amber-50 px-3 py-2 text-sm font-medium text-amber-700"
      >
        Você precisa selecionar pelo menos 3 pontos no mapa para formar uma
        área.
      </div>
      }

      <!-- Ocorrências -->
      <app-select
        id="mass-occurrences"
        label="Ocorrências"
        [options]="massInclusionViewModel.occurrenceOptions()"
        [multiple]="true"
        [disabled]="!massInclusionViewModel.canEditForm()"
        [value]="massInclusionViewModel.massInclusionDataForm.controls.occurrences.value[0]"
        (valueChange)="massInclusionViewModel.onOccurrencesChange($event)"
      />

      <!-- Variedade -->
      <app-select
        id="mass-variety"
        label="Variedade"
        placeholder="Selecione a variedade"
        [options]="massInclusionViewModel.varietyOptions()"
        [disabled]="!massInclusionViewModel.canEditForm()"
        [value]="massInclusionViewModel.massInclusionDataForm.controls.variety.value"
        (valueChange)="massInclusionViewModel.onVarietyChange($event)"
      />
      <!-- Idade -->
      <div class="space-y-1 w-full">
        <label
          for="mass-life-of-tree"
          class="block text-sm font-medium text-slate-700"
        >
          Idade (meses/anos)
        </label>
        <input
          id="mass-life-of-tree"
          type="text"
          formControlName="lifeOfTree"
          placeholder="Ex: 2 anos"
          class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed placeholder-slate-400"
        />
      </div>
      <!-- Data de Plantio -->
      <div class="space-y-1 w-full">
        <label
          for="mass-planting-date"
          class="block text-sm font-medium text-slate-700"
        >
          Data de Plantio
        </label>
        <input
          id="mass-planting-date"
          type="date"
          formControlName="plantingDate"
          class="block w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        />
      </div>
      <!-- Observações -->
      <div class="space-y-1">
        <label
          for="mass-description"
          class="block text-sm font-medium text-slate-700"
        >
          Observações
        </label>
        <textarea
          id="mass-description"
          formControlName="description"
          rows="4"
          placeholder="Adicione observações relevantes sobre esta área..."
          class="block w-full resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-700 outline-none transition-all placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed"
        ></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-4 grid grid-cols-2 gap-3 border-t border-slate-100 pt-4">
      <button
        type="button"
        [disabled]="!massInclusionViewModel.canEditForm() || massInclusionViewModel.isSaving()"
        (click)="onClearMassInclusionFormData()"
        class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border border-slate-200 bg-white text-slate-600 font-semibold text-sm hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
      >
        Limpar
      </button>

      <button
        type="submit"
        [disabled]="!massInclusionViewModel.canEditForm() || massInclusionViewModel.isSaving()"
        class="flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold text-sm hover:bg-emerald-700 transition-all active:scale-95 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
      >
        @if (massInclusionViewModel.isSaving()) {
        <svg
          class="animate-spin h-4 w-4 text-white"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
        Salvando... } @else { Salvar Alterações }
      </button>
    </div>
  </form>
</div>
