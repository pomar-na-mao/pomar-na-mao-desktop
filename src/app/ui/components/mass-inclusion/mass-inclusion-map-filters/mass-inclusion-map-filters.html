<div class="w-full">
  <div class="w-full lg:w-[40%]">
    <app-select
      id="mass-inclusion-region-select"
      label="Filtrar por Região"
      [placeholder]="massInclusionViewModel.regionOptions().length === 0 ? 'Nenhuma região disponível' : 'Selecione uma região'"
      [value]="massInclusionViewModel.selectedRegionId()"
      [options]="massInclusionViewModel.regionOptions()"
      [disabled]="massInclusionViewModel.isLoadingRegions() || massInclusionViewModel.regionOptions().length === 0"
      (valueChange)="massInclusionViewModel.onRegionChange($event)"
    />
  </div>
</div>
