<div class="map-card">
  <div class="controls-container">
    <app-select id="map-region-select" label="PAGES.MAP.ZONE_LABEL"
      [placeholder]="regionOptions().length === 0 ? 'PAGES.MAP.NO_ZONES' : 'PAGES.MAP.ZONE_PLACEHOLDER'" [value]="selectedRegionId()"
      [options]="regionOptions()" [disabled]="isLoadingRegions() || regionOptions().length === 0"
      (valueChange)="onRegionChange($event)" />

    <app-select id="map-occurrence-select" label="PAGES.MAP.OCCURRENCE_LABEL" placeholder="PAGES.MAP.OCCURRENCE_PLACEHOLDER"
      [value]="selectedOccurrenceKey()" [options]="occurrenceOptions()" (valueChange)="onOccurrenceChange($event)" />
  </div>

  <div id="map"></div>
</div>
