<div class="map-card">
  <div class="controls-container">
    <app-select id="map-region-select" label="PAGES.MAP.ZONE_LABEL"
      [placeholder]="vm.regionOptions().length === 0 ? 'PAGES.MAP.NO_ZONES' : 'PAGES.MAP.ZONE_PLACEHOLDER'" [value]="vm.selectedRegionId()"
      [options]="vm.regionOptions()" [disabled]="vm.isLoadingRegions() || vm.regionOptions().length === 0"
      (valueChange)="vm.onRegionChange($event)" />

    <app-select id="map-occurrence-select" label="PAGES.MAP.OCCURRENCE_LABEL" placeholder="PAGES.MAP.OCCURRENCE_PLACEHOLDER"
      [value]="vm.selectedOccurrenceKey()" [options]="vm.occurrenceOptions()" (valueChange)="vm.onOccurrenceChange($event)" />
  </div>

  <div id="map"></div>
</div>
