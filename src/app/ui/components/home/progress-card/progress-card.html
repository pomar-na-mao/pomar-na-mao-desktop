<div class="bg-surface-container rounded-[14px] border border-outline-variant shadow-[0_1px_4px_rgba(0,0,0,0.06),0_4px_12px_rgba(0,0,0,0.04)] flex gap-[14px] items-start p-[16px_18px]">
  <div class="w-[38px] h-[38px] rounded-[10px] flex items-center justify-center shrink-0 bg-secondary-container">
    <span class="material-symbols-outlined text-on-secondary-container text-[20px]!">trending_up</span>
  </div>
  <div class="flex-1 min-w-0">
    <div class="text-[10px] font-semibold tracking-[0.06em] text-on-surface-variant uppercase mb-[4px]">
      {{ 'PAGES.HOME.DASHBOARD.PROGRESS' | translate }}
    </div>
    <div class="text-[24px] font-bold text-on-surface leading-[1.2] my-[2px]">
      {{ percent() }}%
    </div>
    <div class="h-[5px] bg-surface-container-low rounded-full overflow-hidden my-[6px]">
      <div class="h-full bg-secondary rounded-full transition-all duration-300" [style.width.%]="percent()"></div>
    </div>
  </div>
</div>
