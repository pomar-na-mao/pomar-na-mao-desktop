<div
  class="bg-surface-container rounded-[14px] border border-outline-variant shadow-[0_1px_4px_rgba(0,0,0,0.06),0_4px_12px_rgba(0,0,0,0.04)] flex gap-[14px] items-start p-[16px_18px]"
>
  <div
    class="w-[38px] h-[38px] rounded-[10px] flex items-center justify-center shrink-0 bg-success-container"
  >
    <span class="material-symbols-outlined text-on-success-container text-[20px]!"
      >forest</span
    >
  </div>
  <div class="flex-1 min-w-0 relative">
    <div
      class="text-[10px] font-semibold tracking-[0.06em] text-on-surface-variant uppercase"
    >
      {{ 'PAGES.HOME.DASHBOARD.TOTAL_TREES' | translate }}
    </div>
    <div class="text-[24px] font-bold text-on-surface leading-[1.2] my-[2px]">
      {{ total() | number }}
    </div>
    <div class="text-[11px] text-on-surface-variant mt-[2px]">
      {{ 'PAGES.HOME.DASHBOARD.UPDATED_MINS_AGO' | translate: { time:
      (latestUpdatedAt() | timeAgo) } }}
    </div>
  </div>
</div>
