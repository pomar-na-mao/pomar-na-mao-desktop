<div>
  @if (label) {
    <label [for]="id" class="block text-sm font-semibold text-on-surface mb-2 px-1">
      {{ label | translate }}
    </label>
  }
  <div class="relative group">
    @if (icon) {
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
        <span class="material-symbols-outlined text-[20px]">{{ icon }}</span>
      </div>
    }
    <input
      [id]="id"
      [type]="inputType()"
      [placeholder]="placeholder | translate"
      [formControl]="$any(control)"
      [class]="icon ? 'pl-11' : 'pl-4'"
      class="block w-full pr-4 py-3 border border-outline/20 rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary focus:bg-surface transition-all text-on-surface placeholder-on-surface-variant/40 bg-surface-variant/10 hover:border-outline/40 outline-none"
      [class.ring-2]="isInvalid"
      [class.ring-error]="isInvalid"
      [class.border-error]="isInvalid"
      [class.pr-12]="isPasswordType"
    />
    @if (isPasswordType) {
      <button
        type="button"
        (click)="toggleVisibility()"
        class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors cursor-pointer"
        [attr.aria-label]="(showPassword() ? 'PAGES.LOGIN.HIDE_PASSWORD' : 'PAGES.LOGIN.SHOW_PASSWORD') | translate"
      >
        <span class="material-symbols-outlined text-[20px]">
          {{ showPassword() ? 'visibility_off' : 'visibility' }}
        </span>
      </button>
    }
  </div>
  @if (isInvalid && currentErrorMessage) {
    <p class="mt-2 text-xs text-error font-medium px-1">
      {{ currentErrorMessage | translate }}
    </p>
  }
</div>
