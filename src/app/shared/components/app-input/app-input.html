<div>
  @if (label) {
    <label [for]="id" class="block text-sm font-semibold text-on-surface-variant mb-1.5 px-1">
      {{ label | translate }}
    </label>
  }
  <div class="relative group">
    @if (icon) {
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
        <span class="material-symbols-outlined text-[20px]">{{ icon }}</span>
      </div>
    }
    <input
      [id]="id"
      [type]="inputType()"
      [placeholder]="placeholder | translate"
      [formControl]="$any(control)"
      class="block w-full pr-4 py-3 border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder-outline/50 bg-surface-container-low outline-none"
      [class]="{
        'bg-error-container/20!': isInvalid,
        'border-solid!': isInvalid,
        'border-error/30!': isInvalid,
        'border!': isInvalid,
        'text-error!': isInvalid,
        'pl-11': icon,
        'pl-4': !icon,
        'pr-12': isPasswordType
      }"
    />
    @if (isPasswordType) {
      <button
        type="button"
        (click)="toggleVisibility()"
        class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors cursor-pointer"
        [attr.aria-label]="(showPassword() ? 'PAGES.LOGIN.HIDE_PASSWORD' : 'PAGES.LOGIN.SHOW_PASSWORD') | translate"
      >
        <span class="material-symbols-outlined text-[20px]">
          {{ showPassword() ? 'visibility_off' : 'visibility' }}
        </span>
      </button>
    }
  </div>
  @if (isInvalid && currentErrorMessage) {
    <p class="mt-1.5 text-xs text-error px-1 font-medium">
      {{ currentErrorMessage | translate }}
    </p>
  }
</div>
