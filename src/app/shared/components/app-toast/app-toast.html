@if (messageService.showMessage()) {
<div class="fixed top-6 right-6 z-9999 animate-fade-in-down">
  <div
    class="min-w-[320px] max-w-md p-4 rounded-2xl border backdrop-blur-md flex items-center shadow-2xl space-x-4 transition-all"
    [ngClass]="bgClass">
    <!-- Icon -->
    <div class="shrink-0 w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white">
      <span class="material-symbols-outlined text-2xl">{{ icon }}</span>
    </div>

    <!-- Content -->
    <div class="grow">
      <p class="text-white font-medium leading-tight">
        {{ messageService.currentMessage()?.text }}
      </p>
    </div>

    <!-- Close Button -->
    <button (click)="messageService.hide()" class="shrink-0 text-white/60 hover:text-white transition-colors">
      <span class="material-symbols-outlined text-xl">close</span>
    </button>
  </div>
</div>
}
