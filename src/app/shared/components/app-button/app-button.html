<button
  [type]="type"
  [disabled]="loading || disabled"
  class="flex justify-center items-center py-4 px-8 border border-transparent rounded-xl text-base font-bold text-on-primary bg-gradient-to-br from-primary to-primary-container hover:opacity-95 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-[0_10px_25px_-5px_rgba(79,70,229,0.4),0_8px_10px_-6px_rgba(79,70,229,0.4),0_0_20px_2px_rgba(79,70,229,0.2)] hover:shadow-[0_20px_35px_-10px_rgba(79,70,229,0.5),0_15px_15px_-10px_rgba(79,70,229,0.5),0_0_25px_5px_rgba(79,70,229,0.3)] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:active:scale-100"
  [class.w-full]="fullWidth"
>
  @if (loading) {
    <svg
      class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
      ></path>
    </svg>
  }
  <span>{{ label }}</span>
</button>
