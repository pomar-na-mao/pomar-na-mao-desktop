<div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Relatórios</h1>
      <p class="text-slate-500 mt-1">
        Visualize e gerencie todos os relatórios gerados pelo sistema.
      </p>
    </div>
    <button
      class="flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition-all active:scale-95 shadow-sm"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 6v6m0 0v6m0-6h6m-6 0H6"
        />
      </svg>
      Novo Relatório
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap gap-4">
    <div class="flex-1 min-w-[200px]">
      <app-input
        placeholder="Buscar relatório..."
        icon="<svg xmlns='http://www.w3.org/2000/svg' class='h-4 w-4' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' /></svg>"
      ></app-input>
    </div>
    <app-select
      [options]="[
        { label: 'Todos os tipos', value: 'all' },
        { label: 'Financeiro', value: 'fin' },
        { label: 'Operacional', value: 'ope' },
        { label: 'RH', value: 'rh' },
      ]"
      class="w-48"
    ></app-select>
    <app-select
      [options]="[
        { label: 'Últimos 30 dias', value: 30 },
        { label: 'Últimos 6 meses', value: 180 },
        { label: 'Este ano', value: 365 },
      ]"
      class="w-48"
    ></app-select>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-200">
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
              Nome do Relatório
            </th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
              Tipo
            </th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
              Data de Geração
            </th>
            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
              Status
            </th>
            <th
              class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right"
            >
              Ações
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          @for (report of reports; track report) {
            <tr class="hover:bg-slate-50 transition-colors group">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div class="p-2 bg-slate-100 rounded-lg group-hover:bg-white transition-colors">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-5 w-5 text-slate-500"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                      />
                    </svg>
                  </div>
                  <span class="font-semibold text-slate-700">{{ report.name }}</span>
                </div>
              </td>
              <td class="px-6 py-4 text-sm text-slate-600">{{ report.type }}</td>
              <td class="px-6 py-4 text-sm text-slate-600">{{ report.date }}</td>
              <td class="px-6 py-4">
                <span
                  class="px-3 py-1 text-xs font-bold rounded-full border"
                  [ngClass]="getStatusClass(report.status)"
                >
                  {{ report.status }}
                </span>
              </td>
              <td class="px-6 py-4 text-right">
                <button class="p-2 text-slate-400 hover:text-emerald-600 transition-colors">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                    />
                  </svg>
                </button>
                <button class="p-2 text-slate-400 hover:text-red-600 transition-colors ml-2">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <div class="p-4 border-t border-slate-100 flex items-center justify-between bg-slate-50">
      <p class="text-sm text-slate-500">Mostrando 5 de 24 relatórios</p>
      <div class="flex gap-2">
        <button
          class="px-3 py-1 border border-slate-200 rounded bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-50"
          disabled
        >
          Anterior
        </button>
        <button
          class="px-3 py-1 border border-slate-200 rounded bg-white text-slate-600 hover:bg-slate-50"
        >
          Próximo
        </button>
      </div>
    </div>
  </div>
</div>
