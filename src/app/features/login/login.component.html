<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 p-4"
>
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500"
  >
    <div class="p-8">
      <!-- Logo/Header -->
      <div class="flex flex-col items-center mb-8">
        <div
          class="w-16 h-16 bg-emerald-600 rounded-xl flex items-center justify-center shadow-lg mb-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-10 w-10 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900">Bem-vindo de volta</h1>
        <p class="text-slate-500 text-sm">Entre na sua conta para continuar</p>
      </div>

      <!-- Form -->
      <form [formGroup]="vm.loginForm" (ngSubmit)="vm.submit()" class="space-y-6">
        <app-input
          label="E-mail"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          [error]="isFieldInvalid('email') ? 'Por favor, insira um e-mail válido.' : ''"
          icon="<svg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207' /></svg>"
        ></app-input>

        <app-input
          label="Senha"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [error]="isFieldInvalid('password') ? 'A senha deve ter pelo menos 4 caracteres.' : ''"
          icon="<svg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z' /></svg>"
        >
          <a
            label-extra
            href="#"
            class="text-xs text-emerald-600 hover:text-emerald-500 font-medium transition-colors"
            >Esqueceu a senha?</a
          >
        </app-input>

        <!-- Error Alert -->
        @if (vm.errorMessage()) {
          <div
            class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm animate-in fade-in"
          >
            {{ vm.errorMessage() }}
          </div>
        }

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="vm.isSubmitDisabled()"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-all active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed"
        >
          @if (vm.isLoading()) {
            <svg
              class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          }
          {{ vm.isLoading() ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <!-- Footer -->
      <p class="mt-8 text-center text-sm text-slate-500">
        Não tem uma conta?
        <a href="#" class="font-medium text-emerald-600 hover:text-emerald-500 transition-colors"
          >Cadastre-se grátis</a
        >
      </p>
    </div>
  </div>
</div>
